services:
  sana:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ../notes:/app/notes
    environment:
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - SANA_PASSWORD=${SANA_PASSWORD:?SANA_PASSWORD is required}
      - PORT=8080
