services:
  sana:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5560:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - SANA_PASSWORD=${SANA_PASSWORD:?SANA_PASSWORD is required}
      - SQLITE_PATH=/data/sana.db
      - PORT=8080
    volumes:
      - ${SANA_DATA_DIR:-./sana_data}:/data
    restart: unless-stopped
